services:
  # ── Backend API ─────────────────────────────────────────────────────────
  - type: web
    name: vendorhub-api
    runtime: node
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
      - key: MONGO_URI
        sync: false          # set manually in dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_COOKIE_EXPIRES
        value: "7"
      - key: CLIENT_URL
        sync: false          # set to your frontend URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: PLATFORM_COMMISSION_RATE
        value: "10"

  # ── Frontend ─────────────────────────────────────────────────────────────
  - type: web
    name: vendorhub-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL e.g. https://vendorhub-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
